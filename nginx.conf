events {}

http {
    # Detect cloudflared's WebSocket marker and inject missing headers
    map $http_cf_cloudflared_proxy_connection_upgrade $ws_upgrade {
        "websocket"  "upgrade";
        default      $http_upgrade;
    }

    map $ws_upgrade $ws_connection {
        "upgrade"    "Upgrade";
        default      $http_connection;
    }

    server {
        listen 20682;
        location / {
            proxy_pass http://127.0.0.1:20683;
            proxy_http_version 1.1;

            # These headers fix the handshake
            proxy_set_header Upgrade $ws_upgrade;
            proxy_set_header Connection $ws_connection;
            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}